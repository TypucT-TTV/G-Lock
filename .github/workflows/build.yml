name: build

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Tauri Application
        run: npm run tauri build

      - name: Upload NSIS Setup Installer
        uses: actions/upload-artifact@v4
        with:
          name: G-Lock-Setup
          path: src-tauri/target/release/bundle/nsis/G-Lock_*_x64-setup.exe

      - name: Upload MSI Package
        uses: actions/upload-artifact@v4
        with:
          name: G-Lock-MSI
          path: src-tauri/target/release/bundle/msi/G-Lock_*_x64_en-US.msi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-tauri/target/release/bundle/nsis/G-Lock_*_x64-setup.exe
            src-tauri/target/release/bundle/msi/G-Lock_*_x64_en-US.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
