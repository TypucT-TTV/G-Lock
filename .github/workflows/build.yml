name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    runs-on: windows-latest
    permissions:
      contents: read
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Node Dependencies
        run: npm ci

      - name: Check Svelte and TypeScript
        run: npm run check

      - name: Check Rust Formatting
        run: cargo fmt --all --manifest-path src-tauri/Cargo.toml -- --check

      - name: Run Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Run Rust Tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  build:
    needs: quality
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    permissions:
      contents: write
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: lts/*

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Tauri Application
        run: npm run tauri build

      - name: Upload NSIS Setup Installer
        uses: actions/upload-artifact@v4
        with:
          name: G-Lock-Setup
          path: src-tauri/target/release/bundle/nsis/G-Lock_*_x64-setup.exe

      - name: Upload MSI Package
        uses: actions/upload-artifact@v4
        with:
          name: G-Lock-MSI
          path: src-tauri/target/release/bundle/msi/G-Lock_*_x64_en-US.msi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-tauri/target/release/bundle/nsis/G-Lock_*_x64-setup.exe
            src-tauri/target/release/bundle/msi/G-Lock_*_x64_en-US.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
